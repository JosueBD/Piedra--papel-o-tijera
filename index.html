<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedra, papel o tijera</title>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <header>
        <h1>Piedra, papel o tijera</h1>
    </header>
    <main>
        <p class="instrucciones" id="instrucciones">
            Llega a 7 puntos y gana.
        </p>
        <div class="marcador">
            <p class="nombre nombre-jugador">Jugador</p>
            <p class="nombre nombre-pc">Pc</p>
            <p class="puntos">
                <span id="puntos-usuario">0</span>
                <span>-</span>
                <span id="puntos-pc">0</span>
            </p>
        </div>
        <div class="escoge-objeto" id="escoge-objeto">
            <h2>Escoge objeto y juega</h2>
            <div class="objeto">
                <button class="btn-objeto" id="piedra💎">💎</button>
                <button class="btn-objeto" id="papel📄">📄</button>
                <button class="btn-objeto" id="tijera✂️">✂️</button>
            </div>
        </div>
        <div class="mensaje disabled" id="mensaje">
            <p>
                Usaste <span class="eleccion" id="eleccion-usuario">papel📄</span><br>
                y la pc usó <span class="eleccion" id="eleccion-pc">piedra💎</span>
            </p>
            <p id="gana-punto">¡Ganaste un punto! 🏅</p>
        </div>
        <button class="btn disabled" id="reiniciar">Reiniciar juego</button>
        
    
    </main>

    <script src="./js/main.js"></script>
</body>
</html>
